version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricetracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d pricetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn main:app -b 0.0.0.0:5000 --workers 2 --timeout 120
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracker:tracker@db:5432/pricetracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A worker.celery worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracker:tracker@db:5432/pricetracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A worker.celery beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracker:tracker@db:5432/pricetracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  flower:
    build: .
    command: celery -A worker.celery flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracker:tracker@db:5432/pricetracker
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pgdata:
